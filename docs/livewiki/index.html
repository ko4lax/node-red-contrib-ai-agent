<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Node-RED AI Agent Documentation</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css" />
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.css">
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'Node-RED AI Agent',
      repo: 'https://github.com/lesichkovm/node-red-contrib-ai-agent',
      loadSidebar: true,
      auto2top: true,
      search: 'auto',
      maxLevel: 4,
      subMaxLevel: 2,
      plugins: [
        function(hook, vm) {
          hook.doneEach(function() {
            // Initialize Mermaid after each page load
            if (window.mermaid) {
              mermaid.init();
            }
          });
        }
      ]
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    // Configure Mermaid
    mermaid.initialize({ startOnLoad: false });
  </script>
</body>
</html>
